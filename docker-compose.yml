services:
  mysql:
    image: mysql:8.0
    container_name: nmo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nmo_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  backend:
    build: ./backend
    container_name: nmo-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: nmo_db
      JWT_SECRET: nmo_super_secret_key_change_in_production_2024
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:3000
      AT_API_KEY: atsk_8efa5843d1ba805d45cee0d02cd850acec8718c3d1278da256e8509ff0ee1e5b56c7cf79
      AT_USERNAME: YOUR_AT_USERNAME_HERE
      AT_SENDER_ID: NMO
      MOMO_SUBSCRIPTION_KEY: 9123c59c40ba4e7787c2455bbc3f001d
      MOMO_ENV: sandbox
      MOMO_COLLECTION_BASE: https://sandbox.momodeveloper.mtn.co.rw
      MOMO_PROVISION_BASE: https://sandbox.momodeveloper.mtn.co.rw
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: nmo-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mysql_data:
