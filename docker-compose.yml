services:
  mysql:
    image: mariadb:10.11
    container_name: nmo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: nmo_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  minio:
    image: minio/minio:latest
    container_name: nmo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  backend:
    build: ./backend
    container_name: nmo-backend
    restart: on-failure
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      DB_NAME: nmo_db
      JWT_SECRET: ${JWT_SECRET:-nmo_super_secret_key_change_in_production_2024}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:3000
      AT_API_KEY: ${AT_API_KEY:-}
      AT_USERNAME: ${AT_USERNAME:-}
      AT_SENDER_ID: NMO
      MOMO_SUBSCRIPTION_KEY: ${MOMO_SUBSCRIPTION_KEY:-}
      MOMO_ENV: sandbox
      MOMO_COLLECTION_BASE: https://sandbox.momodeveloper.mtn.co.rw
      MOMO_PROVISION_BASE: https://sandbox.momodeveloper.mtn.co.rw
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: nmo-images
      S3_REGION: us-east-1
      S3_PUBLIC_URL: http://localhost:9000/nmo-images
    depends_on:
      - mysql
      - minio

  frontend:
    build: ./frontend
    container_name: nmo-frontend
    restart: on-failure
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
  minio_data:
